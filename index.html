<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Population widgets</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    .wrap {
      display: flex;
      gap: 18px;
      justify-content: center;
      align-items: center;
      padding: 10px 14px;
      background: transparent;
    }

    .card {
      min-width: 320px;
      padding: 16px 20px;
      border-radius: 20px;
      background: rgba(20, 24, 35, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #ffffff;
    }

    .label {
      font-size: 14px;
      line-height: 1.2;
      color: rgba(255,255,255,0.72);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .value {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    .world .value {
      color: #7dd3fc;
      text-shadow: 0 0 18px rgba(125, 211, 252, 0.28);
    }

    .russia .value {
      color: #86efac;
      text-shadow: 0 0 18px rgba(134, 239, 172, 0.24);
    }

    @media (max-width: 760px) {
      .wrap {
        flex-direction: column;
      }
      .card {
        min-width: 260px;
        width: calc(100vw - 40px);
      }
      .value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card world">
      <div class="label">Население мира</div>
      <div id="world" class="value">—</div>
    </div>

    <div class="card russia">
      <div class="label">Население России</div>
      <div id="russia" class="value">—</div>
    </div>
  </div>

  <script>
    // Базовые значения
    let world = 8298978817;
    let russia = 146261423;

    // Примерный темп изменения в секунду
    // Мир: растёт
    let worldPerSec = 2.3;

    // Россия: берём положительное очень небольшое изменение,
    // чтобы счётчик тоже "жил" как в live-clock.
    // Если захотите, можно потом сделать отрицательное значение.
    let russiaPerSec = 0.0013;

    function formatNumber(num) {
      return Math.round(num).toLocaleString("ru-RU");
    }

    function updateCounters() {
      world += worldPerSec;
      russia += russiaPerSec;

      document.getElementById("world").textContent = formatNumber(world);
      document.getElementById("russia").textContent = formatNumber(russia);
    }

    updateCounters();
    setInterval(updateCounters, 1000);
  </script>
</body>
</html>
